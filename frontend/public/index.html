<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Login — Student Course Management System</title>
<meta name="description" content="Miva University Student Course Management System" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" />

<link rel="stylesheet" href="assets/css/style.css" />
<link rel="stylesheet" href="assets/css/login.css" />
<link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body>

<div class="login-page">

  <!-- Left brand / illustration panel -->
  <div class="login-page__brand login-page__brand--image-only">
    <div class="login-image-container">
      <img src="assets/images/miva.jpg" alt="Miva University" />
    </div>
  </div>

  <!-- Right login card panel -->
  <div class="login-page__form-side">
    <div class="login-card">
      <div class="login-card__avatar">
        <span class="material-symbols-outlined">school</span>
      </div>
      <h2>Welcome back</h2>
      <p>Sign in to view your courses, register new ones, and track your total credit units.</p>

      <button id="loginBtn" class="btn btn--primary login-btn">
        <span id="loginSpinner" class="spinner hidden"></span>
        <span id="loginBtnLabel">Login to Dashboard</span>
      </button>

      <div class="login-card__footer">Protected by Firebase Authentication</div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/login.js"></script>
</body>
</html>
